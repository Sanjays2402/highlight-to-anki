<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Edit before send — Highlight to Anki</title>
<link rel="stylesheet" href="popup.css">
<link rel="stylesheet" href="editor.css">
</head>
<body data-theme="dark" class="editor-body">
  <div class="ambient" aria-hidden="true">
    <span class="blob blob-a"></span>
    <span class="blob blob-b"></span>
  </div>

  <header class="topbar glass">
    <div class="brand">
      <svg class="brand-mark" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 20h9"/>
        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4z"/>
      </svg>
      <span class="title">Edit before send</span>
    </div>
    <span id="status-pill" class="pill pill-checking" data-state="idle">
      <span class="dot" aria-hidden="true"></span>
      <span class="pill-text" id="status-text">Ready</span>
    </span>
  </header>

  <main class="editor-main">
    <section class="card glass editor-card" id="empty-card" hidden>
      <div class="empty">
        <svg class="empty-art" width="96" height="72" viewBox="0 0 120 90" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M10 30c8-16 30-22 46-14 10 5 18 4 28-2 10-6 22-2 24 10 2 12-8 22-22 24-26 4-58-2-66-8-10-6-12-6-10-10z" opacity="0.30"/>
          <rect x="32" y="28" width="56" height="36" rx="6"/>
          <path d="M40 40h40M40 50h28"/>
        </svg>
        <p class="empty-text">No capture loaded. Right-click a selection and choose <em>Edit &amp; Send to Anki…</em>.</p>
      </div>
    </section>

    <section class="card glass editor-card" id="form-card">
      <div class="mode-row">
        <div class="seg" role="tablist" aria-label="Card mode">
          <button type="button" class="seg-btn is-active" data-mode="basic" role="tab" aria-selected="true">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="5" width="18" height="14" rx="2"/>
              <path d="M3 11h18"/>
            </svg>
            <span>Basic</span>
          </button>
          <button type="button" class="seg-btn" data-mode="cloze" role="tab" aria-selected="false">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 12c0-4 3-7 8-7s8 3 8 7-3 7-8 7"/>
              <path d="M9 12h6"/>
            </svg>
            <span>Cloze</span>
          </button>
        </div>
      </div>

      <div class="grid grid-2">
        <label class="field">
          <span class="field-label">Deck</span>
          <div class="select-wrap">
            <select id="deck-select" class="control"></select>
            <svg class="caret" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M6 9l6 6 6-6"/>
            </svg>
          </div>
        </label>
        <label class="field">
          <span class="field-label" id="model-label">Note type</span>
          <div class="select-wrap">
            <select id="model-select" class="control"></select>
            <svg class="caret" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M6 9l6 6 6-6"/>
            </svg>
          </div>
        </label>
      </div>

      <label class="field" id="front-field">
        <span class="field-label">Front</span>
        <textarea id="front-input" class="control" rows="3" spellcheck="false"></textarea>
      </label>

      <label class="field" id="back-field">
        <span class="field-label">Back</span>
        <textarea id="back-input" class="control" rows="4" spellcheck="false"></textarea>
        <span class="field-hint">HTML allowed. The source link and context are auto-appended on send.</span>
      </label>

      <label class="field" id="cloze-field" hidden>
        <span class="field-label">Cloze text</span>
        <textarea id="cloze-input" class="control" rows="5" spellcheck="false"></textarea>
        <span class="field-hint">Wrap the part to hide as <span class="mono">{{c1::like this}}</span>.</span>
      </label>

      <label class="field" id="extra-field" hidden>
        <span class="field-label">Extra</span>
        <textarea id="extra-input" class="control" rows="3" spellcheck="false"></textarea>
      </label>

      <label class="field">
        <span class="field-label">Tags</span>
        <input id="tags-input" type="text" class="control" autocomplete="off" spellcheck="false" placeholder="space- or comma-separated">
      </label>

      <div class="source-row">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M10 13a5 5 0 0 0 7.07 0l3-3a5 5 0 0 0-7.07-7.07l-1 1"/>
          <path d="M14 11a5 5 0 0 0-7.07 0l-3 3a5 5 0 0 0 7.07 7.07l1-1"/>
        </svg>
        <a id="source-link" class="source-link mono" href="#" target="_blank" rel="noopener noreferrer">—</a>
      </div>

      <div id="error-row" class="kv kv-error" hidden>
        <span class="k">Error</span>
        <span class="v" id="error-text">—</span>
      </div>
    </section>
  </main>

  <footer class="editor-actions glass">
    <button id="cancel-btn" class="btn btn-ghost" type="button">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M6 6l12 12M18 6L6 18"/>
      </svg>
      <span>Cancel</span>
    </button>
    <button id="send-btn" class="btn btn-primary" type="button" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 11l18-8-8 18-2-8-8-2z"/>
      </svg>
      <span id="send-label">Send to Anki</span>
    </button>
  </footer>

  <script type="module" src="editor.js"></script>
</body>
</html>
