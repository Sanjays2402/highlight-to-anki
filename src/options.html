<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Highlight to Anki — Settings</title>
<link rel="stylesheet" href="options.css">
</head>
<body data-theme="dark">
  <div class="ambient" aria-hidden="true">
    <span class="blob blob-a"></span>
    <span class="blob blob-b"></span>
    <span class="blob blob-c"></span>
  </div>

  <main class="shell">
    <header class="hero">
      <div class="brand">
        <svg class="brand-mark" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 6.5a2.5 2.5 0 0 1 2.5-2.5h11A2.5 2.5 0 0 1 20 6.5v11a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 17.5z"/>
          <path d="M8 9.5h8M8 13h5"/>
        </svg>
        <div>
          <h1>Highlight to Anki</h1>
          <p class="subtitle">Choose where new cards land and which note type they use.</p>
        </div>
      </div>
      <span class="pill pill-checking" id="health-pill" data-state="checking">
        <span class="dot" aria-hidden="true"></span>
        <span class="pill-text">Checking AnkiConnect…</span>
      </span>
    </header>

    <section class="card glass" id="defaults-card">
      <div class="card-head">
        <span class="card-label">Defaults</span>
        <button id="refresh-btn" class="btn btn-ghost" type="button" title="Refresh from Anki" aria-label="Refresh from Anki">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12a9 9 0 1 1-3.2-6.9"/>
            <path d="M21 4v5h-5"/>
          </svg>
          <span>Refresh</span>
        </button>
      </div>

      <div class="field">
        <label for="deck-select">Default deck</label>
        <div class="select-wrap">
          <svg class="select-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 7h13l-3-3M3 7l3 3"/>
            <path d="M21 17H8l3 3M21 17l-3-3"/>
          </svg>
          <select id="deck-select" disabled>
            <option value="">Loading…</option>
          </select>
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
        </div>
        <p class="hint">New cards are added to this deck unless overridden.</p>
      </div>

      <div class="field">
        <label for="model-select">Default note type</label>
        <div class="select-wrap">
          <svg class="select-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="4" width="18" height="16" rx="2"/>
            <path d="M7 9h10M7 13h7"/>
          </svg>
          <select id="model-select" disabled>
            <option value="">Loading…</option>
          </select>
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
        </div>
        <p class="hint">Front / Back fields use this note type by default.</p>
      </div>

      <div class="actions">
        <span class="save-state" id="save-state" aria-live="polite"></span>
        <button id="save-btn" class="btn btn-primary" type="button" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M5 12l5 5L20 7"/>
          </svg>
          <span>Save defaults</span>
        </button>
      </div>
    </section>

    <section class="empty glass" id="empty-state" hidden>
      <svg width="120" height="96" viewBox="0 0 240 192" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M40 60c0-12 10-22 22-22h116c12 0 22 10 22 22v72c0 12-10 22-22 22H62c-12 0-22-10-22-22z" opacity="0.35"/>
        <path d="M60 80h120M60 100h80M60 120h60"/>
        <circle cx="190" cy="60" r="18" opacity="0.5"/>
        <path d="M184 60l4 4 8-8"/>
      </svg>
      <h2>Can't reach Anki</h2>
      <p>Start Anki and enable the AnkiConnect add-on, then hit Refresh.</p>
    </section>
  </main>

  <script type="module" src="options.js"></script>
</body>
</html>
