<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Highlight to Anki</title>
<link rel="stylesheet" href="popup.css">
</head>
<body data-theme="dark">
  <div class="ambient" aria-hidden="true">
    <span class="blob blob-a"></span>
    <span class="blob blob-b"></span>
  </div>

  <header class="topbar glass">
    <div class="brand">
      <svg class="brand-mark" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M4 6.5a2.5 2.5 0 0 1 2.5-2.5h11A2.5 2.5 0 0 1 20 6.5v11a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 17.5z"/>
        <path d="M8 9.5h8M8 13h5"/>
      </svg>
      <span class="title">Highlight to Anki</span>
    </div>
    <button id="settings-btn" class="icon-btn" title="Settings" aria-label="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09A1.65 1.65 0 0 0 15 4.6a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.36.16.6.54.6 1V12c0 .46-.24.84-.6 1z"/>
      </svg>
    </button>
  </header>

  <main id="root" class="content">
    <section class="card glass" id="health-card" aria-live="polite">
      <div class="card-head">
        <span class="card-label">AnkiConnect</span>
        <span class="pill pill-checking" id="health-pill" data-state="checking">
          <span class="dot" aria-hidden="true"></span>
          <span class="pill-text">Checking…</span>
        </span>
      </div>
      <div class="card-body">
        <div class="kv">
          <span class="k">Endpoint</span>
          <span class="v mono" id="health-endpoint">http://127.0.0.1:8765</span>
        </div>
        <div class="kv">
          <span class="k">Version</span>
          <span class="v mono" id="health-version">—</span>
        </div>
        <div class="kv kv-error" id="health-error-row" hidden>
          <span class="k">Error</span>
          <span class="v" id="health-error">—</span>
        </div>
        <div class="kv">
          <span class="k">Last check</span>
          <span class="v" id="health-checked">—</span>
        </div>
      </div>
      <div class="card-foot">
        <button id="health-refresh" class="btn btn-ghost" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12a9 9 0 1 1-3.2-6.9"/>
            <path d="M21 4v5h-5"/>
          </svg>
          <span>Re-check</span>
        </button>
      </div>
    </section>
  </main>
  <footer class="footer"><span class="version">v0.1.0</span></footer>
  <script type="module" src="popup.js"></script>
</body>
</html>
