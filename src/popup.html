<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Highlight to Anki</title>
<link rel="stylesheet" href="popup.css">
</head>
<body data-theme="dark">
  <header class="topbar">
    <div class="title">Highlight to Anki</div>
    <button id="settings-btn" class="icon-btn" title="Settings" aria-label="Settings">⚙</button>
  </header>
  <main id="root" class="content">
    <p class="placeholder">Select text → send to local Anki via AnkiConnect with source URL auto-cited.</p>
    <p class="placeholder small">Roadmap features will populate this view.</p>
  </main>
  <footer class="footer"><span class="version">v0.1.0</span></footer>
  <script type="module" src="popup.js"></script>
</body>
</html>
